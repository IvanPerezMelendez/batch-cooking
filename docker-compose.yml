services:
  db:
    image: postgres:16
    container_name: batch_cooking_db
    environment:
      POSTGRES_USER: batchcooking
      POSTGRES_PASSWORD: batchcooking
      POSTGRES_DB: batchcooking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
